server {
    listen 80;
    server_name _;

    # Larger upload limit so product images can be uploaded
    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to backend container
    location /api/ {
        proxy_pass http://backend:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy uploaded files to backend container
    location /uploads/ {
        proxy_pass http://backend:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 1h;
    }

    # SPA — serve index.html for any unknown route so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health endpoint for compose
    location = /healthz {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
