version: '2.4'

# ────────────────────────────────────────────────────────────────────
# Habib Bike Showroom — full stack in Docker
#
# How to start:
#   docker compose up -d         (or:  sudo docker-compose up -d)
#
# How to stop:
#   docker compose down          (data persists)
#   docker compose down -v       (also wipes the database + uploaded files)
#
# After it's running:
#   • Frontend (open in browser):  http://localhost:8080
#   • Backend API (optional):      http://localhost:5050/api/health
#   • Postgres (optional):         localhost:5433 (user: habib / pass: habib_secret)
#
# Default login:  admin / admin123
# ────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: habib_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: habib
      POSTGRES_PASSWORD: habib_secret
      POSTGRES_DB: habib_showroom
    ports:
      # Optional — exposed so you can connect with a SQL client. Remove if not needed.
      - "5433:5432"
    volumes:
      - habib_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habib -d habib_showroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: habib_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5050
      NODE_ENV: production
      JWT_SECRET: bike_showroom_super_secret_key_change_this_in_production_2026
      JWT_EXPIRES_IN: 7d
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: habib_showroom
      DB_USER: habib
      DB_PASSWORD: habib_secret
      DB_LOGGING: "false"
      # Auto-seed dummy data on first start (idempotent — safe to leave on).
      # Change to "false" once you've added your real data.
      AUTO_SEED: "true"
    volumes:
      - habib_uploads:/app/uploads
    ports:
      # Optional — direct backend access. The frontend already proxies /api → backend internally.
      - "5050:5050"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: habib_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # ★ Open this in your browser → http://localhost:8080
      - "8080:80"

volumes:
  habib_pgdata:
  habib_uploads:
  