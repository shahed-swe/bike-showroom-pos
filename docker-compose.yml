services:
  postgres:
    image: postgres:16-alpine
    container_name: habib_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: habib
      POSTGRES_PASSWORD: habib_secret
      POSTGRES_DB: habib_showroom
    ports:
      # Optional: exposed on host port 5433 so you can inspect with a SQL client.
      # Remove this if you don't need external DB access.
      - "5433:5432"
    volumes:
      - habib_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habib -d habib_showroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: habib_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5050
      NODE_ENV: production
      JWT_SECRET: bike_showroom_super_secret_key_change_this_in_production_2026
      JWT_EXPIRES_IN: 7d
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: habib_showroom
      DB_USER: habib
      DB_PASSWORD: habib_secret
      DB_LOGGING: "false"
      # Set to "true" so the first run auto-loads demo data.
      # Change to "false" if you don't want demo data.
      AUTO_SEED: "true"
    volumes:
      - habib_uploads:/app/uploads
    expose:
      - "5050"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: habib_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Open this URL in your browser → http://localhost:8080
      - "8080:80"

volumes:
  habib_pgdata:
  habib_uploads:
